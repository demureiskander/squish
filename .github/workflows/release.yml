name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode (needs Swift 6)
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=/Applications/Xcode.app; fi
          echo "Using $XC"
          sudo xcode-select -s "$XC"

      - name: Show versions
        run: |
          xcodebuild -version
          swiftc --version

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Compute checksum
        id: sha
        run: echo "sha256=$(shasum -a 256 dist/Squish.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Squish.dmg
          generate_release_notes: true
          body: |
            ### Squish ${{ github.ref_name }}

            **Install via Homebrew:**
            ```
            brew install --cask demureiskander/tap/squish
            ```

            Or download `Squish.dmg` below.

            > ⚠️ The app is not notarized yet. On first launch: right-click → **Open**.

            DMG SHA-256: `${{ steps.sha.outputs.sha256 }}`
